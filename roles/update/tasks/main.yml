---
- name: Check if dotfiles repo exists
  stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
  register: dotfiles_stat

- name: Check if gear repo exists
  stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.gear"
  register: gear_stat

- name: Check if amun script exists
  stat:
    path: "{{ ansible_facts['env']['HOME'] }}/bin/amun"
  register: amun_stat

- name: Update and upgrade packages (Debian)
  apt:
    upgrade: full
    update_cache: yes
    allow_downgrade: yes
    autoclean: yes
    autoremove: yes
  become: true
  retries: 5
  delay: 5
  register: result
  until: result is not failed
  when: ansible_facts['os_family'] == 'Debian'

- name: Update and upgrade Homebrew formulae (macOS)
  community.general.homebrew:
    update_homebrew: true
    upgrade_all: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Update and upgrade Homebrew casks (macOS)
  community.general.homebrew_cask:
    upgrade_all: true
    greedy: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Cleanup Homebrew cache (macOS)
  command: brew cleanup
  changed_when: false
  when: ansible_facts['os_family'] == 'Darwin'

- name: Update and upgrade packages (Arch)
  community.general.pacman:
    update_cache: yes
    upgrade: yes
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Find orphan packages (Arch)
  command: pacman -Qdtq
  register: orphans
  changed_when: false
  failed_when: false
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Remove orphan packages (Arch)
  command: "pacman -Rns --noconfirm {{ orphans.stdout_lines | join(' ') }}"
  become: true
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - orphans.rc == 0
    - orphans.stdout_lines | length > 0

- name: Update dotfiles repo
  git:
    repo: "https://github.com/GonzaloAlvarez/dotfiles.git"
    dest: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
    update: yes
  when: dotfiles_stat.stat.exists
  register: dotfiles_update

- name: Run dotfiles setup
  ansible.builtin.shell:
    cmd: "./setup"
    chdir: "{{ ansible_facts['env']['HOME'] }}/.dotfiles/"
  when:
    - dotfiles_stat.stat.exists
    - dotfiles_update is changed

- name: Update gear repo
  git:
    repo: "https://github.com/GonzaloAlvarez/gear.git"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gear"
    update: yes
  when: gear_stat.stat.exists

- name: Update amun script
  get_url:
    url: https://raw.githubusercontent.com/gonzaloalvarez/amun/main/amun
    dest: "{{ ansible_facts['env']['HOME'] }}/bin/amun"
    mode: "0755"
  when: amun_stat.stat.exists

- name: Check if kepr exists
  stat:
    path: "{{ ansible_facts['env']['HOME'] }}/bin/kepr"
  register: kepr_stat

- name: Get latest kepr version
  uri:
    url: https://api.github.com/repos/gonzaloalvarez/kepr/releases/latest
    return_content: yes
  register: kepr_release
  when: kepr_stat.stat.exists

- name: Set kepr version and arch facts
  set_fact:
    kepr_version: "{{ kepr_release.json.tag_name }}"
    kepr_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}"
  when: kepr_stat.stat.exists

- name: Set kepr OS fact
  set_fact:
    kepr_os: "{{ 'darwin' if ansible_facts['os_family'] == 'Darwin' else 'linux' }}"
  when: kepr_stat.stat.exists

- name: Download and install kepr
  block:
    - name: Create temp directory for kepr
      tempfile:
        state: directory
      register: kepr_tmp

    - name: Download kepr tarball
      get_url:
        url: "https://github.com/GonzaloAlvarez/kepr/releases/download/{{ kepr_version }}/kepr-{{ kepr_version }}-{{ kepr_os }}-{{ kepr_arch }}.tar.gz"
        dest: "{{ kepr_tmp.path }}/kepr.tar.gz"

    - name: Extract kepr tarball
      unarchive:
        src: "{{ kepr_tmp.path }}/kepr.tar.gz"
        dest: "{{ kepr_tmp.path }}"
        remote_src: yes

    - name: Find kepr binary
      find:
        paths: "{{ kepr_tmp.path }}"
        patterns: "kepr-{{ kepr_os }}-*"
        file_type: file
      register: kepr_binary

    - name: Install kepr binary
      copy:
        src: "{{ kepr_binary.files[0].path }}"
        dest: "{{ ansible_facts['env']['HOME'] }}/bin/kepr"
        mode: "0755"
        remote_src: yes

    - name: Remove kepr temp directory
      file:
        path: "{{ kepr_tmp.path }}"
        state: absent
  when: kepr_stat.stat.exists
